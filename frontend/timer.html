<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
  <title>Боксёрский таймер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#25262D;font-family:'Montserrat',system-ui,sans-serif;user-select:none;overflow:hidden}
    #root{position:fixed;top:0;left:0;right:0;bottom:0;background:#25262D;overflow:hidden}

    /* Screen transitions */
    .screen{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;background:#25262D;transition:transform .3s cubic-bezier(.3,0,.2,1),opacity .3s}
    #home{transform:none;opacity:1}
    #home.behind{transform:translateX(-25%);opacity:.5;pointer-events:none}
    #create{transform:translateX(100%)}
    #create.active{transform:translateX(0)}

    /* Typography */
    .mono{font-family:'Montserrat',system-ui,sans-serif;font-weight:900}

    /* Timer display */
    #timer-area{background:#EDE136;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px}
    #round-badge{width:56px;height:56px;border-radius:50%;background:#2D2E36;color:#fff;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:22px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    #phase-label{color:#2D2E36;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;margin-bottom:16px}
    #time-display{color:#2D2E36;font-family:'Montserrat',system-ui,sans-serif;font-weight:900;font-size:88px;line-height:1;letter-spacing:-1px}
    #time-display.pre{font-size:120px}

    /* Shelf */
    #shelf{padding:10px 12px 6px;border-top:1px solid #42434A}
    #shelf-inner{display:flex;gap:10px;overflow-x:auto;align-items:stretch}
    #shelf-inner::-webkit-scrollbar{display:none}
    .chip{width:80px;height:80px;background:#42434A;border:2.5px solid transparent;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;flex-shrink:0}
    .chip.sel{background:transparent;border-color:#EDE136}
    .chip-primary{color:#EDE136;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:24px;line-height:1}
    .chip-secondary{color:#EDE136;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:12px;letter-spacing:1px}
    .chip-sub{color:#EDE136;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:10px;text-align:center;line-height:1.2;margin-top:2px}
    .chip-add{width:80px;height:80px;background:#42434A;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#EDE136;font-size:34px;cursor:pointer;flex-shrink:0}

    /* Buttons */
    #btn-area{padding:10px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px);display:flex;gap:12px}
    .btn-primary{background:#EDE136;color:#2D2E36;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:22px;letter-spacing:1px;text-transform:uppercase;border:none;border-radius:4px;cursor:pointer;flex:1;height:60px}
    .btn-primary.dim{background:#817D36;opacity:.9;cursor:default}
    .btn-icon{width:60px;height:60px;background:#42434A;border:none;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

    /* Menu button */
    #menu-btn{position:absolute;top:calc(env(safe-area-inset-top,0px) + 12px);right:16px;background:none;border:none;cursor:pointer;color:#2D2E36;font-size:26px;line-height:1;padding:8px;font-weight:900;z-index:1}

    /* Done screen */
    #done-screen{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;background:#25262D}
    #done-screen.visible{display:flex}
    #done-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:16px}
    .done-emoji{font-size:72px}
    .done-sub{color:#9A9BA5;font-family:'Montserrat',system-ui,sans-serif;font-size:16px;font-weight:500}
    .done-stats{display:flex;gap:10px;width:100%;max-width:340px}
    .done-stat{flex:1;background:#42434A;border-radius:4px;padding:16px 8px;text-align:center}
    .done-stat-val{color:#EDE136;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:22px;line-height:1}
    .done-stat-lbl{color:#9A9BA5;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-top:6px}
    #done-btn-area{padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)}

    /* Menu sheet */
    #menu-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;background:rgba(0,0,0,.6);display:none;align-items:flex-end}
    #menu-overlay.visible{display:flex}
    #menu-sheet{width:100%;background:#42434A;border-radius:12px 12px 0 0;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 8px)}
    #menu-handle{width:36px;height:4px;border-radius:2px;background:#9A9BA5;margin:12px auto 4px;opacity:.5}
    #menu-title{padding:8px 20px 14px;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:15px;color:#fff;letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid #4A4B53}
    .menu-sound-row{display:flex;align-items:center;padding:14px 20px;border-bottom:1px solid #4A4B53}
    .menu-sound-label{flex:1;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:1px;text-transform:uppercase}
    .snd-btn{margin-left:8px;padding:5px 12px;border:2px solid #4A4B53;border-radius:4px;background:transparent;color:#9A9BA5;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:11px;cursor:pointer;letter-spacing:.5px;text-transform:uppercase}
    .snd-btn.active{border-color:#EDE136;color:#EDE136}
    .menu-item{display:block;width:100%;background:none;border:none;border-top:1px solid #4A4B53;padding:15px 20px;text-align:left;font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:14px;color:#fff;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer}
    .menu-item.danger{color:#EDE136}

    /* Create screen */
    #create-header{background:#EDE136;padding:22px 20px 26px}
    #create-title{display:inline-block;color:#2D2E36;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.5px;border-bottom:3px solid #2D2E36;padding-bottom:8px}
    #create-fields{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
    #create-footer{display:flex;gap:12px;padding:16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px);background:#25262D}

    /* DSField dropdown */
    .field{border:2px solid #4A4B53;border-radius:4px;overflow:hidden}
    .field.has-val{border-color:#EDE136}
    .field.open{border-color:#817D36}
    .field-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;cursor:pointer}
    .field-label{font-family:'Montserrat',system-ui,sans-serif;font-weight:700;font-size:16px;letter-spacing:1px;text-transform:uppercase;color:#C9CAD2}
    .field-label.filled{color:#fff}
    .field-chevron{color:#EDE136;font-size:16px}
    .field-options{display:none;max-height:220px;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
    .field.open .field-options{display:block}
    .field-option{font-family:'Montserrat',system-ui,sans-serif;font-weight:600;font-size:16px;letter-spacing:1px;padding:14px 18px;cursor:pointer;color:#C9CAD2}
    .field-option.sel{background:#817D36;color:#fff;font-weight:700}

    /* Trash icon SVG */
    .trash-icon{width:22px;height:22px}
  </style>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"/>
</head>
<body>
<div id="root">

  <!-- Home screen -->
  <div class="screen" id="home">
    <button id="menu-btn">≡</button>
    <div id="timer-area">
      <div id="round-badge">3</div>
      <div id="phase-label">ROUNDS</div>
      <div id="time-display">3:00</div>
    </div>
    <div id="shelf"><div id="shelf-inner"></div></div>
    <div id="btn-area"></div>
    <div id="menu-overlay">
      <div id="menu-sheet">
        <div id="menu-handle"></div>
        <div id="menu-title"></div>
        <div class="menu-sound-row">
          <span class="menu-sound-label">Звук</span>
          <button class="snd-btn" data-snd="electronic">ЭЛЕКТРО</button>
          <button class="snd-btn" data-snd="gong">ГОНГ</button>
        </div>
        <button class="menu-item" id="menu-new">＋ Новый таймер</button>
        <button class="menu-item" id="menu-edit">✏️ Изменить</button>
        <button class="menu-item danger" id="menu-delete">🗑 Удалить</button>
        <button class="menu-item" id="menu-close">✕ Закрыть</button>
      </div>
    </div>
    <div id="done-screen">
      <div style="background:#EDE136;padding:22px 20px 26px">
        <span style="display:inline-block;color:#2D2E36;font-family:'Montserrat',system-ui,sans-serif;font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.5px;border-bottom:3px solid #2D2E36;padding-bottom:8px">ТРЕНИРОВКА ЗАВЕРШЕНА!</span>
      </div>
      <div id="done-body">
        <div class="done-emoji">🥊</div>
        <div class="done-sub">Отличная работа, чемпион</div>
        <div class="done-stats" id="done-stats"></div>
      </div>
      <div id="done-btn-area">
        <button class="btn-primary" id="done-again" style="width:100%">ЕЩЁ РАЗ</button>
      </div>
    </div>
  </div>

  <!-- Create screen -->
  <div class="screen" id="create">
    <div id="create-header"><div id="create-title">НОВЫЙ ТАЙМЕР</div></div>
    <div id="create-fields"></div>
    <div id="create-footer">
      <button class="btn-icon" id="create-back">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#EDE136" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>
      </button>
      <button class="btn-primary dim" id="create-save" style="flex:1;height:60px;font-size:20px">СОЗДАТЬ</button>
    </div>
  </div>

</div>

<script>
(function(){
'use strict';

/* ── Telegram ── */
var tg = window.Telegram && window.Telegram.WebApp;
if(tg){ tg.ready(); tg.expand(); }
function hap(t){
  try{
    if(!tg||!tg.HapticFeedback)return;
    if(t==='l')tg.HapticFeedback.impactOccurred('light');
    if(t==='m')tg.HapticFeedback.impactOccurred('medium');
    if(t==='s')tg.HapticFeedback.notificationOccurred('success');
  }catch(e){}
}

/* ── Utils ── */
function fmt(s){return Math.floor(s/60)+':'+(''+(s%60)).padStart(2,'0');}
function fmtMin(s){return s<60?s+' с':(s%60===0?s/60+' мин':fmt(s));}
function plural(n,a,b,c){return n%10===1&&n%100!==11?a:n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?b:c;}

/* ── Storage ── */
var LS={KEY:'bt9',LAST:'bt9_last',SND:'bt_sound'};
var DEF=[
  {id:'d1',label:'3 мин · Классик',roundTime:180,rest:60,rounds:3,explosive:null},
  {id:'d2',label:'2 мин · Боец',roundTime:120,rest:60,rounds:12,explosive:null}
];
function loadTimers(){try{return JSON.parse(localStorage.getItem(LS.KEY)||'null')||DEF;}catch(e){return DEF;}}
function saveTimers(t){try{localStorage.setItem(LS.KEY,JSON.stringify(t));}catch(e){}}
function loadLast(){try{return localStorage.getItem(LS.LAST)||'d1';}catch(e){return 'd1';}}
function saveLast(id){try{localStorage.setItem(LS.LAST,id);}catch(e){}}
function loadSound(){try{return localStorage.getItem(LS.SND)||'electronic';}catch(e){return 'electronic';}}
function saveSound(s){try{localStorage.setItem(LS.SND,s);}catch(e){}}

/* ── Phases ── */
function buildPhases(t){
  var N=t.rounds===Infinity?999:t.rounds,ph=[];
  for(var r=1;r<=N;r++){
    if(t.explosive&&t.explosive.trigger==='end_minute'){
      var w=t.explosive.warnTime,mins=Math.floor(t.roundTime/60);
      for(var m=0;m<mins;m++) ph.push({phase:'work',dur:60,round:r,boomAt:w});
      var rem=t.roundTime%60;
      if(rem>0) ph.push({phase:'work',dur:rem,round:r,boomAt:rem>w?w:0});
    } else if(t.explosive&&t.explosive.trigger==='end_round'){
      ph.push({phase:'work',dur:t.roundTime,round:r,boomAt:t.explosive.warnTime});
    } else {
      ph.push({phase:'work',dur:t.roundTime,round:r,boomAt:0});
    }
    if(r<N) ph.push({phase:'rest',dur:t.rest,round:r,boomAt:0});
  }
  return ph;
}

/* ── Sound ── */
function playElectronic(type){
  var ctx=new(window.AudioContext||window.webkitAudioContext)();
  function tone(f,dur,delay,vol){
    delay=delay||0;vol=vol||0.3;
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=f;o.type='square';
    var t=ctx.currentTime+delay;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  }
  if(type==='start'){tone(880,.12);tone(1100,.18,.15);}
  if(type==='end'){tone(1100,.1);tone(880,.1,.14);tone(660,.22,.28);}
  if(type==='boom'){tone(1320,.08);tone(1760,.12,.1);}
  if(type==='tick'){tone(440,.05,0,.14);}
}
/* Preload gong audio files */
var _gongBig = new Audio('sounds/boxing-gong.mp3');
var _gongShort = new Audio('sounds/gong-sound.mp3');
_gongBig.preload='auto'; _gongShort.preload='auto';

function playGong(type){
  function play(audio, delay, stopAfter){
    delay=delay||0;
    setTimeout(function(){
      var a=audio.cloneNode();
      a.volume=1;
      a.play().catch(function(){});
      if(stopAfter) setTimeout(function(){a.pause();},stopAfter);
    }, delay*1000);
  }
  if(type==='start') play(_gongBig);                        /* 16.6s — пусть звенит */
  if(type==='end'){ play(_gongBig); play(_gongBig,1); play(_gongBig,2); } /* 3 удара */
  if(type==='boom') play(_gongShort);                       /* 8.3s — однократный */
  if(type==='tick') play(_gongShort, 0, 600);               /* обрезать после 0.6s */
}
function beep(type){try{loadSound()==='gong'?playGong(type):playElectronic(type);}catch(e){}}

/* ── State ── */
var timers=loadTimers();
var selId=loadLast();
if(!timers.find(function(t){return t.id===selId;})) selId=timers[0]?timers[0].id:null;
var snd=loadSound();
var phases=[];
var idx=0,left=0,run=false,done=false,pre=0;
var ivRun=null,ivPre=null;
var screen='home';
var editing=null;

function getTimer(){return timers.find(function(t){return t.id===selId;})||timers[0]||null;}

function resetTimer(){
  clearInterval(ivRun);clearInterval(ivPre);
  run=false;done=false;pre=0;
  var t=getTimer();
  if(t){phases=buildPhases(t);idx=0;left=phases[0]?phases[0].dur:0;}
  renderHome();
}

function selectTimer(id){
  selId=id;saveLast(id);
  resetTimer();
}

/* ── Timer logic ── */
function tick(){
  left--;
  if(left<=0){
    var ni=idx+1;
    if(ni>=phases.length){
      clearInterval(ivRun);run=false;done=true;
      beep('end');hap('s');
      showDone();return;
    }
    beep('end');hap('m');
    idx=ni;left=phases[ni].dur;
  } else {
    var cur=phases[idx];
    if(cur&&cur.boomAt>0&&left===cur.boomAt){beep('boom');hap('m');}
    if(left<=3){beep('tick');hap('l');}
  }
  renderTimerDisplay();
  renderShelf();
}

function startTimer(){
  beep('start');hap('m');
  run=true;
  ivRun=setInterval(tick,1000);
  renderHome();
}

function toggle(){
  if(done)return;
  if(run){clearInterval(ivRun);run=false;renderHome();return;}
  if(pre>0){clearInterval(ivPre);pre=0;renderTimerDisplay();renderButtons();return;}
  /* 5-second pre-countdown */
  pre=5;renderTimerDisplay();renderButtons();
  beep('tick');hap('l');
  ivPre=setInterval(function(){
    pre--;
    if(pre<=0){
      clearInterval(ivPre);pre=0;
      startTimer();
    } else {
      beep('tick');hap('l');
      renderTimerDisplay();
    }
  },1000);
}

/* ── Render helpers ── */
function $(id){return document.getElementById(id);}

function renderTimerDisplay(){
  var t=getTimer();
  var cur=phases[idx];
  var totalR=t?(t.rounds===Infinity?'∞':t.rounds):0;
  var curR=cur?cur.round:1;
  var isBoom=!done&&cur&&cur.boomAt>0&&left<=cur.boomAt;
  var isRest=!done&&cur&&cur.phase==='rest';

  var badge,label,time,big;
  if(pre>0){
    badge=totalR;label='СТАРТ ЧЕРЕЗ';time=String(pre);big=true;
  } else if(run||idx>0){
    badge=curR;
    label=isBoom?'ВЗРЫВ!':isRest?'ОТДЫХ':'ROUND';
    time=fmt(left);big=false;
  } else {
    badge=totalR;label='ROUNDS';time=fmt(left);big=false;
  }

  $('round-badge').textContent=badge;
  $('phase-label').textContent=label;
  var td=$('time-display');
  td.textContent=time;
  td.className=big?'pre':'';
}

function renderShelf(){
  var t=getTimer();
  var cur=phases[idx];
  var totalR=t?(t.rounds===Infinity?'∞':t.rounds):0;
  var inner=$('shelf-inner');
  var html='';
  timers.forEach(function(tm){
    var sel=tm.id===selId;
    var mins=Math.floor(tm.roundTime/60),secs=tm.roundTime%60;
    var primary=sel&&run?(cur?cur.round:1):(mins>0?mins:secs);
    var secondary=sel&&run?('/ '+totalR):(mins>0?'МИН':'СЕК');
    var sub=sel&&run?tm.label:(tm.rounds===Infinity?'∞':tm.rounds)+' РД';
    html+='<div class="chip'+(sel?' sel':'')+'" data-id="'+tm.id+'">'
      +'<span class="chip-primary">'+primary+'</span>'
      +'<span class="chip-secondary">'+secondary+'</span>'
      +'<span class="chip-sub">'+sub+'</span>'
      +'</div>';
  });
  html+='<div class="chip-add" id="chip-add">+</div>';
  inner.innerHTML=html;
  inner.querySelectorAll('.chip').forEach(function(el){
    el.addEventListener('click',function(){hap('l');selectTimer(el.dataset.id);});
  });
  var addBtn=inner.querySelector('#chip-add');
  if(addBtn) addBtn.addEventListener('click',function(){hap('l');openCreate(null);});
}

function renderButtons(){
  var area=$('btn-area');
  var inPre=pre>0;
  if(run||idx>0||inPre){
    area.innerHTML='<button class="btn-icon" id="btn-reset">'
      +'<svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#EDE136" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13M10 11v6M14 11v6"/></svg>'
      +'</button>'
      +'<button class="btn-primary'+(run||inPre?'':' dim')+'" id="btn-toggle">'+(run?'STOP':inPre?'ОТМЕНА':'START')+'</button>';
    var rb=$('btn-reset');
    if(rb) rb.addEventListener('click',function(){hap('l');resetTimer();});
  } else {
    area.innerHTML='<button class="btn-primary" id="btn-toggle">START</button>';
  }
  var tb=$('btn-toggle');
  if(tb) tb.addEventListener('click',toggle);
}

function renderHome(){
  renderTimerDisplay();
  renderShelf();
  renderButtons();
  var t=getTimer();
  $('menu-title').textContent=t?t.label:'';
  /* Sound buttons */
  document.querySelectorAll('.snd-btn').forEach(function(b){
    b.classList.toggle('active',b.dataset.snd===snd);
  });
}

function showDone(){
  var t=getTimer();
  var totalR=t?(t.rounds===Infinity?'∞':t.rounds):0;
  var ds=$('done-stats');
  ds.innerHTML=[
    {v:totalR,l:'РАУНДОВ'},
    {v:t?fmt(t.roundTime):'',l:'РАУНД'},
    {v:t?fmtMin(t.rest):'',l:'ОТДЫХ'}
  ].map(function(x){
    return '<div class="done-stat"><div class="done-stat-val">'+x.v+'</div><div class="done-stat-lbl">'+x.l+'</div></div>';
  }).join('');
  $('done-screen').className='visible';
}

function hideDone(){
  $('done-screen').className='';
}

/* ── Create screen ── */
var RT_OPTS=[10,20,30,40,50,60,90,120,150,180,210,240,270,300,360,420,480,540,600];
var REST_OPTS=[10,20,30,40,50,60,90,120,180];
var EXP_DATA=[
  {l:'Без взрывов',v:null},
  {l:'В конце раунда',v:'end_round'},
  {l:'В конце каждой минуты',v:'end_minute'}
];
var WARN_OPTS=[5,10,15,20,25,30];
var RT_LABELS=RT_OPTS.map(fmtMin);
var REST_LABELS=REST_OPTS.map(fmtMin);
var ROUNDS_LABELS=(function(){var a=[];for(var i=1;i<=15;i++)a.push(String(i));a.push('∞');return a;})();
var EXP_LABELS=EXP_DATA.map(function(o){return o.l;});
var WARN_LABELS=WARN_OPTS.map(function(s){return s+' с';});

var createState={rt:'',rest:'',rds:'',exp:'Без взрывов',warn:'10 с'};

function makeField(id,label,opts,val,onChange){
  var el=document.createElement('div');
  el.className='field'+(val?' has-val':'');
  el.innerHTML='<div class="field-header">'
    +'<span class="field-label'+(val?' filled':'')+'">'+( val||label)+'</span>'
    +'<span class="field-chevron">▾</span>'
    +'</div>'
    +'<div class="field-options">'
    +opts.map(function(o){return '<div class="field-option'+(o===val?' sel':'')+'" data-val="'+o+'">'+o+'</div>';}).join('')
    +'</div>';
  var hdr=el.querySelector('.field-header');
  var optCont=el.querySelector('.field-options');
  var labelEl=el.querySelector('.field-label');
  var chev=el.querySelector('.field-chevron');
  hdr.addEventListener('click',function(){
    var open=el.classList.contains('open');
    /* Close all others */
    document.querySelectorAll('.field.open').forEach(function(f){
      f.classList.remove('open');
      f.querySelector('.field-chevron').textContent='▾';
    });
    if(!open){el.classList.add('open');chev.textContent='▴';}
  });
  el.querySelectorAll('.field-option').forEach(function(opt){
    opt.addEventListener('click',function(){
      var v=opt.dataset.val;
      el.classList.remove('open');chev.textContent='▾';
      el.classList.add('has-val');
      labelEl.textContent=v;labelEl.classList.add('filled');
      el.querySelectorAll('.field-option').forEach(function(o){o.classList.toggle('sel',o===opt);});
      onChange(v);
      updateCreateSave();
    });
  });
  return el;
}

function buildCreateFields(){
  var cf=$('create-fields');
  cf.innerHTML='';
  cf.appendChild(makeField('rt','ВРЕМЯ РАУНДА',RT_LABELS,createState.rt,function(v){createState.rt=v;}));
  cf.appendChild(makeField('rest','ОТДЫХ',REST_LABELS,createState.rest,function(v){createState.rest=v;}));
  cf.appendChild(makeField('rds','РАУНДЫ',ROUNDS_LABELS,createState.rds,function(v){createState.rds=v;}));
  cf.appendChild(makeField('exp','ВЗРЫВНАЯ РАБОТА',EXP_LABELS,createState.exp,function(v){createState.exp=v;buildCreateFields();}));
  if(createState.exp!=='Без взрывов'){
    cf.appendChild(makeField('warn','ПРЕДУПРЕЖДЕНИЕ',WARN_LABELS,createState.warn,function(v){createState.warn=v;}));
  }
  updateCreateSave();
}

function updateCreateSave(){
  var ok=createState.rt&&createState.rest&&createState.rds;
  var btn=$('create-save');
  btn.className='btn-primary'+(ok?'':' dim')+' '+(editing?'':'');
  btn.textContent=editing?'СОХРАНИТЬ':'СОЗДАТЬ';
  btn.onclick=ok?saveTimer:null;
}

function saveTimer(){
  hap('s');
  var RT_REV={};RT_OPTS.forEach(function(s){RT_REV[fmtMin(s)]=s;});
  var REST_REV={};REST_OPTS.forEach(function(s){REST_REV[fmtMin(s)]=s;});
  var EXP_REV={};EXP_DATA.forEach(function(o){EXP_REV[o.l]=o.v;});
  var WARN_REV={};WARN_OPTS.forEach(function(s){WARN_REV[s+' с']=s;});
  var rt=RT_REV[createState.rt];
  var rest=REST_REV[createState.rest];
  var rds=createState.rds==='∞'?Infinity:parseInt(createState.rds);
  var expTrigger=EXP_REV[createState.exp];
  var warn=WARN_REV[createState.warn]||10;
  var label=fmtMin(rt)+' · '+(rds===Infinity?'∞':rds)+' '+plural(rds===Infinity?5:rds,'раунд','раунда','раундов');
  var t={
    id:editing?editing.id:String(Date.now()),
    label:label,roundTime:rt,rest:rest,rounds:rds,
    explosive:expTrigger?{trigger:expTrigger,warnTime:warn}:null
  };
  var i=timers.findIndex(function(x){return x.id===t.id;});
  if(i>=0) timers[i]=t; else timers.push(t);
  saveTimers(timers);
  selId=t.id;saveLast(t.id);
  closeCreate();
  resetTimer();
}

function openCreate(tmr){
  editing=tmr||null;
  $('create-title').textContent=editing?'ИЗМЕНИТЬ ТАЙМЕР':'НОВЫЙ ТАЙМЕР';
  createState={
    rt: editing&&editing.roundTime?fmtMin(editing.roundTime):'',
    rest: editing&&editing.rest?fmtMin(editing.rest):'',
    rds: editing?(editing.rounds===Infinity?'∞':String(editing.rounds)):'',
    exp: editing&&editing.explosive?(EXP_DATA.find(function(o){return o.v===editing.explosive.trigger;})||{l:'Без взрывов'}).l:'Без взрывов',
    warn: editing&&editing.explosive&&editing.explosive.warnTime?editing.explosive.warnTime+' с':'10 с'
  };
  buildCreateFields();
  $('home').classList.add('behind');
  $('create').classList.add('active');
  screen='create';
}
function closeCreate(){
  $('home').classList.remove('behind');
  $('create').classList.remove('active');
  screen='home';
  editing=null;
}

function deleteTimer(id){
  hap('m');
  timers=timers.filter(function(t){return t.id!==id;});
  saveTimers(timers);
  if(selId===id) selId=timers[0]?timers[0].id:null;
  saveLast(selId||'');
  resetTimer();
}

/* ── Event wiring ── */
$('menu-btn').addEventListener('click',function(){hap('l');$('menu-overlay').classList.add('visible');});
$('menu-overlay').addEventListener('click',function(e){
  if(e.target===$('menu-overlay')) $('menu-overlay').classList.remove('visible');
});
$('menu-new').addEventListener('click',function(){hap('l');$('menu-overlay').classList.remove('visible');openCreate(null);});
$('menu-edit').addEventListener('click',function(){hap('l');$('menu-overlay').classList.remove('visible');openCreate(getTimer());});
$('menu-delete').addEventListener('click',function(){$('menu-overlay').classList.remove('visible');deleteTimer(selId);});
$('menu-close').addEventListener('click',function(){$('menu-overlay').classList.remove('visible');});
document.querySelectorAll('.snd-btn').forEach(function(b){
  b.addEventListener('click',function(){snd=b.dataset.snd;saveSound(snd);hap('l');
    document.querySelectorAll('.snd-btn').forEach(function(x){x.classList.toggle('active',x.dataset.snd===snd);});
  });
});
$('create-back').addEventListener('click',function(){hap('l');closeCreate();});
$('done-again').addEventListener('click',function(){hideDone();resetTimer();});

/* ── Boot ── */
resetTimer();

})();
</script>
</body>
</html>
