<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
  <title>Боксёрский таймер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="boxing-ds.js?v=2"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html,body,#root{height:100%;overflow:hidden;margin:0}
    body{overscroll-behavior:none;user-select:none;-webkit-tap-highlight-color:transparent}
    *{box-sizing:border-box;scrollbar-width:none}
    *::-webkit-scrollbar{display:none}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { tokens, Button, Field, DurationChip, AddChip, TimerDisplay,
        HeaderBand, RoundBadge, IconButton, injectGlobal } = BoxingDS;
injectGlobal();

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

/* ══════════════ УТИЛИТЫ ══════════════════════════════════ */
const fmt    = s => `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
const fmtMin = s => s < 60 ? `${s} с` : (s%60===0 ? `${s/60} мин` : fmt(s));
const plural  = (n,a,b,c) =>
  n%10===1&&n%100!==11 ? a : n%10>=2&&n%10<=4&&(n%100<10||n%100>=20) ? b : c;

/* ══════════════ LOCALSTORAGE ═════════════════════════════ */
const LS = { KEY:'bt9', LAST:'bt9_last', SND:'bt_sound' };
const DEF = [
  {id:'d1', label:'3 мин · Классик',  roundTime:180, rest:60,  rounds:3,  explosive:null},
  {id:'d2', label:'2 мин · Боец',     roundTime:120, rest:60,  rounds:12, explosive:null},
];
const loadTimers = () => { try { return JSON.parse(localStorage.getItem(LS.KEY)||'null')||DEF; } catch { return DEF; }};
const saveTimers = t  => { try { localStorage.setItem(LS.KEY, JSON.stringify(t)); } catch {} };
const loadLast   = () => { try { return localStorage.getItem(LS.LAST)||'d1'; } catch { return 'd1'; }};
const saveLast   = id => { try { localStorage.setItem(LS.LAST, id); } catch {} };
const loadSound  = () => { try { return localStorage.getItem(LS.SND)||'electronic'; } catch { return 'electronic'; }};
const saveSound  = t  => { try { localStorage.setItem(LS.SND, t); } catch {} };

/* ══════════════ ФАЗЫ ═════════════════════════════════════ */
function buildPhases(t) {
  const N = t.rounds === Infinity ? 999 : t.rounds, ph = [];
  for (let r = 1; r <= N; r++) {
    if (t.explosive?.trigger === 'end_minute') {
      const w = t.explosive.warnTime, mins = Math.floor(t.roundTime/60);
      for (let m = 0; m < mins; m++) ph.push({phase:'work', dur:60,         round:r, boomAt:w});
      const rem = t.roundTime%60;
      if (rem > 0) ph.push({phase:'work', dur:rem, round:r, boomAt:rem>w?w:0});
    } else if (t.explosive?.trigger === 'end_round') {
      ph.push({phase:'work', dur:t.roundTime, round:r, boomAt:t.explosive.warnTime});
    } else {
      ph.push({phase:'work', dur:t.roundTime, round:r, boomAt:0});
    }
    if (r < N) ph.push({phase:'rest', dur:t.rest, round:r, boomAt:0});
  }
  return ph;
}

/* ══════════════ ЗВУК ═════════════════════════════════════ */
function playElectronic(type) {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const tone = (f,dur,delay=0,vol=.3) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value=f; o.type='square';
    const t=ctx.currentTime+delay;
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur);
  };
  if (type==='start') { tone(880,.12); tone(1100,.18,.15); }
  if (type==='end')   { tone(1100,.1); tone(880,.1,.14); tone(660,.22,.28); }
  if (type==='boom')  { tone(1320,.08); tone(1760,.12,.1); }
  if (type==='tick')  { tone(440,.05,0,.14); }
}
function playGong(type) {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const now = ctx.currentTime;
  function strike(base, dur, vol=.4) {
    [1,2.756,5.404,8.933,13.344].forEach((p,i) => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=base*p; o.type='sine';
      g.gain.setValueAtTime(vol*[1,.6,.3,.15,.08][i], now);
      g.gain.exponentialRampToValueAtTime(.0001, now+dur*(1/(i+1)*1.5));
      o.start(now); o.stop(now+dur+.1);
    });
    const bl=Math.floor(ctx.sampleRate*.05), buf=ctx.createBuffer(1,bl,ctx.sampleRate);
    const d=buf.getChannelData(0);
    for (let i=0;i<bl;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(bl*.15));
    const ns=ctx.createBufferSource(), ng=ctx.createGain();
    ns.buffer=buf; ns.connect(ng); ng.connect(ctx.destination); ng.gain.value=vol*.5; ns.start(now);
  }
  if (type==='start') strike(220, 2.5, .45);
  if (type==='end')   [0,.28,.52].forEach(d => setTimeout(()=>strike(220,1.5,.35), d*1000));
  if (type==='boom')  strike(440, .8, .3);
  if (type==='tick')  strike(660, .3, .15);
}
function beep(type) { try { loadSound()==='gong' ? playGong(type) : playElectronic(type); } catch {} }
const hap = t => {
  try {
    if (t==='l') tg?.HapticFeedback?.impactOccurred('light');
    if (t==='m') tg?.HapticFeedback?.impactOccurred('medium');
    if (t==='s') tg?.HapticFeedback?.notificationOccurred('success');
  } catch {}
};

/* ══════════════ ОПЦИИ ПОЛЕЙ CREATE ══════════════════════ */
const RT_OPTS    = [10,20,30,40,50,60,90,120,150,180,210,240,270,300,360,420,480,540,600];
const REST_OPTS  = [10,20,30,40,50,60,90,120,180];
const EXP_DATA   = [
  {l:'Без взрывов',             v:null},
  {l:'В конце раунда',          v:'end_round'},
  {l:'В конце каждой минуты',   v:'end_minute'},
];
const WARN_OPTS  = [5,10,15,20,25,30];

const RT_LABELS    = RT_OPTS.map(fmtMin);
const REST_LABELS  = REST_OPTS.map(fmtMin);
const ROUNDS_LABELS= [...Array.from({length:15},(_,i)=>String(i+1)), '∞'];
const EXP_LABELS   = EXP_DATA.map(o => o.l);
const WARN_LABELS  = WARN_OPTS.map(s => `${s} с`);
const RT_REV       = Object.fromEntries(RT_OPTS.map(s   => [fmtMin(s), s]));
const REST_REV     = Object.fromEntries(REST_OPTS.map(s => [fmtMin(s), s]));
const EXP_REV      = Object.fromEntries(EXP_DATA.map(o  => [o.l, o.v]));
const WARN_REV     = Object.fromEntries(WARN_OPTS.map(s  => [`${s} с`, s]));

/* ══════════════ ЭКРАН СОЗДАНИЯ ══════════════════════════ */
function CreateScreen({ onBack, onCreate, editTimer, active }) {
  const init = v => editTimer ? v : '';
  const initExp = () => editTimer
    ? (EXP_DATA.find(o => o.v === (editTimer.explosive?.trigger ?? null))?.l || 'Без взрывов')
    : 'Без взрывов';

  const [rtStr,   setRtStr  ] = React.useState(() => init(editTimer?.roundTime ? fmtMin(editTimer.roundTime) : ''));
  const [restStr, setRestStr ] = React.useState(() => init(editTimer?.rest ? fmtMin(editTimer.rest) : ''));
  const [rdsStr,  setRdsStr  ] = React.useState(() => init(editTimer ? (editTimer.rounds===Infinity?'∞':String(editTimer.rounds)) : ''));
  const [expStr,  setExpStr  ] = React.useState(initExp);
  const [warnStr, setWarnStr ] = React.useState(() => editTimer?.explosive?.warnTime ? `${editTimer.explosive.warnTime} с` : '10 с');

  const expTrigger = EXP_REV[expStr] ?? null;
  const showWarn   = expTrigger !== null;
  const ok         = rtStr && restStr && rdsStr;

  function submit() {
    hap('s');
    const rt   = RT_REV[rtStr];
    const rest = REST_REV[restStr];
    const rds  = rdsStr === '∞' ? Infinity : parseInt(rdsStr);
    const warn = WARN_REV[warnStr] || 10;
    const label = `${fmtMin(rt)} · ${rds===Infinity?'∞':rds} ${plural(rds===Infinity?5:rds,'раунд','раунда','раундов')}`;
    onCreate({
      id: editTimer?.id || Date.now().toString(),
      label, roundTime: rt, rest, rounds: rds,
      explosive: expTrigger ? { trigger: expTrigger, warnTime: warn } : null,
    });
  }

  return (
    <div style={{
      position:'fixed', inset:0, zIndex:2,
      background: tokens.color.bg,
      display:'flex', flexDirection:'column',
      transform: active ? 'translateX(0)' : 'translateX(100%)',
      transition: 'transform .3s cubic-bezier(.3,0,.2,1)',
    }}>
      <HeaderBand title={editTimer ? 'ИЗМЕНИТЬ ТАЙМЕР' : 'НОВЫЙ ТАЙМЕР'} />

      <div style={{ flex:1, overflowY:'auto', padding:16, display:'flex', flexDirection:'column', gap:12 }}>
        <Field label="ВРЕМЯ РАУНДА"    value={rtStr}   options={RT_LABELS}    onChange={setRtStr}   />
        <Field label="ОТДЫХ"           value={restStr} options={REST_LABELS}  onChange={setRestStr} />
        <Field label="РАУНДЫ"          value={rdsStr}  options={ROUNDS_LABELS}onChange={setRdsStr}  />
        <Field label="ВЗРЫВНАЯ РАБОТА" value={expStr}  options={EXP_LABELS}  onChange={setExpStr}  />
        {showWarn && (
          <Field label="ПРЕДУПРЕЖДЕНИЕ" value={warnStr} options={WARN_LABELS} onChange={setWarnStr} />
        )}
        <div style={{ height: 16 }} />
      </div>

      <div style={{
        display:'flex', gap:12, padding:16,
        paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 16px)`,
        background: tokens.color.bg,
      }}>
        <IconButton icon="trash" onClick={()=>{ hap('l'); onBack(); }} box={60} />
        <Button
          variant={ok ? 'primary' : 'disabled'}
          onClick={ok ? submit : undefined}
          style={{ flex:1, height:60, fontSize:20 }}
        >
          {editTimer ? 'СОХРАНИТЬ' : 'СОЗДАТЬ'}
        </Button>
      </div>
    </div>
  );
}

/* ══════════════ СТИЛЬ ПУНКТА МЕНЮ ════════════════════════ */
const menuItem = {
  display:'block', width:'100%', background:'none', border:'none',
  borderTop: `1px solid ${tokens.color.borderIdle}`,
  padding:'15px 20px', textAlign:'left',
  fontFamily: tokens.font, fontWeight: 700, fontSize:14,
  color: tokens.color.white, letterSpacing:'1.5px',
  textTransform:'uppercase', cursor:'pointer',
};

/* ══════════════ ГЛАВНЫЙ ЭКРАН ════════════════════════════ */
function HomeScreen({ timers, selId, onSelect, onCreate, onEdit, onDelete, active }) {
  const timer  = timers.find(t => t.id === selId) || timers[0];
  const phases = React.useRef(timer ? buildPhases(timer) : []);

  const [idx,  setIdx ] = React.useState(0);
  const [left, setLeft] = React.useState(phases.current[0]?.dur || 0);
  const [run,  setRun ] = React.useState(false);
  const [done, setDone] = React.useState(false);
  const [menu, setMenu] = React.useState(false);
  const [snd,  setSnd ] = React.useState(loadSound);

  const iv   = React.useRef(null);
  const idxR = React.useRef(0);
  idxR.current = idx;

  React.useEffect(() => {
    if (!timer) return;
    clearInterval(iv.current);
    phases.current = buildPhases(timer);
    setIdx(0); setLeft(phases.current[0]?.dur || 0);
    setRun(false); setDone(false);
  }, [selId]);

  const stop  = () => { clearInterval(iv.current); setRun(false); };
  const reset = () => { stop(); setIdx(0); setLeft(phases.current[0]?.dur || 0); setDone(false); hap('l'); };

  function tick() {
    setLeft(prev => {
      if (prev <= 1) {
        const ni = idxR.current + 1;
        if (ni >= phases.current.length) { stop(); setDone(true); beep('end'); hap('s'); return 0; }
        beep('end'); hap('m'); setIdx(ni);
        return phases.current[ni].dur;
      }
      const cur = phases.current[idxR.current];
      if (cur?.boomAt > 0 && prev === cur.boomAt + 1) { beep('boom'); hap('m'); }
      if (prev <= 3) { beep('tick'); hap('l'); }
      return prev - 1;
    });
  }

  function toggle() {
    if (done) return;
    if (run) stop();
    else { beep('start'); hap('m'); setRun(true); iv.current = setInterval(tick, 1000); }
  }
  React.useEffect(() => () => clearInterval(iv.current), []);

  const cur    = phases.current[idx];
  const totalR = timer?.rounds === Infinity ? '∞' : (timer?.rounds || 0);
  const curR   = cur?.round || 1;
  const isBoom = !done && cur?.boomAt > 0 && left <= cur.boomAt;
  const isRest = !done && cur?.phase === 'rest';

  const dispLabel = isBoom ? 'ВЗРЫВ!' : isRest ? 'ОТДЫХ' : (run || idx > 0) ? 'ROUND' : 'ROUNDS';
  const dispCount = (run || idx > 0) ? curR : totalR;
  const dispTime  = fmt(left);

  function chgSound(s) { saveSound(s); setSnd(s); hap('l'); }

  /* ── Экран "Готово" ── */
  if (done) return (
    <div style={{ position:'fixed', inset:0, display:'flex', flexDirection:'column', background:tokens.color.bg }}>
      <HeaderBand title="ТРЕНИРОВКА ЗАВЕРШЕНА!" />
      <div style={{
        flex:1, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        padding:16, gap:16,
      }}>
        <div style={{ fontSize:72 }}>🥊</div>
        <div style={{
          color:tokens.color.muted, fontFamily:tokens.font,
          fontSize:16, fontWeight:500, letterSpacing:'0.5px',
        }}>
          Отличная работа, чемпион
        </div>
        <div style={{ display:'flex', gap:10, width:'100%', maxWidth:340 }}>
          {[
            { v: totalR,                    l:'РАУНДОВ' },
            { v: fmt(timer.roundTime),      l:'РАУНД'   },
            { v: fmtMin(timer.rest),        l:'ОТДЫХ'   },
          ].map(({ v, l }) => (
            <div key={l} style={{
              flex:1, background:tokens.color.raised,
              borderRadius:tokens.radius, padding:'16px 8px', textAlign:'center',
            }}>
              <div style={{ color:tokens.color.primary, fontFamily:tokens.font, fontWeight:800, fontSize:22, lineHeight:1 }}>{v}</div>
              <div style={{ color:tokens.color.muted, fontFamily:tokens.font, fontWeight:700, fontSize:11, letterSpacing:'1.5px', textTransform:'uppercase', marginTop:6 }}>{l}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{ padding:16, paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 16px)` }}>
        <Button onClick={reset} style={{ height:60, fontSize:22 }}>ЕЩЁ РАЗ</Button>
      </div>
    </div>
  );

  /* ── Главный экран ── */
  return (
    <div style={{
      position:'fixed', inset:0,
      display:'flex', flexDirection:'column',
      background: tokens.color.bg,
      transform: active ? 'none' : 'translateX(-25%)',
      opacity: active ? 1 : 0.5,
      transition: 'transform .3s cubic-bezier(.3,0,.2,1), opacity .3s',
      pointerEvents: active ? 'auto' : 'none',
    }}>
      {/* Кнопка меню поверх TimerDisplay */}
      <button
        onClick={() => { hap('l'); setMenu(true); }}
        style={{
          position:'absolute', zIndex:1,
          top:`calc(env(safe-area-inset-top,0px) + 12px)`, right:16,
          background:'none', border:'none', cursor:'pointer',
          color: tokens.color.ink, fontSize:24, lineHeight:1, padding:8,
          fontFamily: tokens.font, fontWeight:900,
        }}
      >≡</button>

      {/* Таймер */}
      <TimerDisplay
        flush
        count={dispCount}
        label={dispLabel}
        time={dispTime}
        timeSize={88}
        style={{ flex:1 }}
      />

      {/* Полка пресетов */}
      <div style={{
        padding:'10px 12px 6px',
        borderTop:`1px solid ${tokens.color.raised}`,
      }}>
        <div style={{ display:'flex', gap:10, overflowX:'auto', alignItems:'stretch' }}>
          {timers.map(t => {
            const isSel = t.id === selId;
            const mins  = Math.floor(t.roundTime / 60);
            const secs  = t.roundTime % 60;
            return (
              <DurationChip
                key={t.id}
                primary={isSel && run ? curR : (mins > 0 ? mins : secs)}
                secondary={isSel && run ? `/ ${totalR}` : (mins > 0 ? 'МИН' : 'СЕК')}
                sub={isSel && run ? t.label : `${t.rounds===Infinity?'∞':t.rounds} РД`}
                selected={isSel}
                onClick={() => { hap('l'); onSelect(t.id); }}
                style={{ flex:'0 0 auto', width:80, height:80 }}
              />
            );
          })}
          <AddChip onClick={() => { hap('l'); onCreate(); }} style={{ flex:'0 0 auto', width:80, height:80 }} />
        </div>
      </div>

      {/* Кнопки действий */}
      <div style={{
        padding:'10px 16px',
        paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 16px)`,
        display:'flex', gap:12,
      }}>
        {run || idx > 0 ? (
          <>
            <IconButton icon="trash" onClick={reset} box={60} style={{ background:tokens.color.raised }} />
            <Button
              variant={run ? 'primary' : 'disabled'}
              onClick={toggle}
              style={{ flex:1, height:60, fontSize:22 }}
            >
              {run ? 'STOP' : 'START'}
            </Button>
          </>
        ) : (
          <Button onClick={toggle} style={{ height:60, fontSize:22 }}>START</Button>
        )}
      </div>

      {/* Меню (bottom sheet на tokens) */}
      {menu && (
        <div
          onClick={() => setMenu(false)}
          style={{
            position:'fixed', inset:0, zIndex:10,
            background:'rgba(0,0,0,.6)',
            display:'flex', alignItems:'flex-end',
          }}
        >
          <div
            onClick={e => e.stopPropagation()}
            style={{
              width:'100%',
              background: tokens.color.raised,
              borderRadius:'12px 12px 0 0',
              paddingBottom:`calc(env(safe-area-inset-bottom,0px) + 8px)`,
            }}
          >
            {/* Ручка */}
            <div style={{ width:36, height:4, borderRadius:2, background:tokens.color.muted, margin:'12px auto 4px', opacity:.5 }} />

            {/* Название пресета */}
            <div style={{
              padding:'8px 20px 14px',
              fontFamily:tokens.font, fontWeight:800, fontSize:15,
              color:tokens.color.white, letterSpacing:'1px', textTransform:'uppercase',
              borderBottom:`1px solid ${tokens.color.borderIdle}`,
            }}>
              {timer?.label}
            </div>

            {/* Переключатель звука */}
            <div style={{
              display:'flex', alignItems:'center', padding:'14px 20px',
              borderBottom:`1px solid ${tokens.color.borderIdle}`,
            }}>
              <span style={{
                flex:1, fontFamily:tokens.font, fontWeight:700, fontSize:14,
                color:tokens.color.white, letterSpacing:'1px', textTransform:'uppercase',
              }}>Звук</span>
              {['electronic','gong'].map(s => (
                <button key={s} onClick={() => chgSound(s)} style={{
                  marginLeft:8, padding:'5px 12px',
                  border:`2px solid ${snd===s ? tokens.color.primary : tokens.color.borderIdle}`,
                  borderRadius:tokens.radius, background:'transparent',
                  color: snd===s ? tokens.color.primary : tokens.color.muted,
                  fontFamily:tokens.font, fontWeight:700, fontSize:11,
                  cursor:'pointer', letterSpacing:'0.5px', textTransform:'uppercase',
                }}>
                  {s === 'electronic' ? 'ЭЛЕКТРО' : 'ГОНГ'}
                </button>
              ))}
            </div>

            <button onClick={() => { hap('l'); setMenu(false); onCreate(); }} style={menuItem}>＋ Новый таймер</button>
            <button onClick={() => { hap('l'); setMenu(false); onEdit(timer); }} style={menuItem}>✏️ Изменить</button>
            <button onClick={() => { hap('m'); setMenu(false); onDelete(timer.id); }} style={{ ...menuItem, color:tokens.color.primary }}>🗑 Удалить</button>
            <button onClick={() => setMenu(false)} style={menuItem}>✕ Закрыть</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════ APP ══════════════════════════════════════ */
function App() {
  const [timers,  setTimers ] = React.useState(loadTimers);
  const [selId,   setSelId  ] = React.useState(() => {
    const last = loadLast(), all = loadTimers();
    return all.find(x => x.id === last) ? last : all[0]?.id || null;
  });
  const [screen,  setScreen ] = React.useState('home');
  const [editing, setEditing] = React.useState(null);

  function handleSelect(id) { setSelId(id); saveLast(id); }
  function handleCreate()    { setEditing(null); setScreen('create'); }
  function handleEdit(t)     { setEditing(t); setScreen('create'); }

  function handleDelete(id) {
    const next = timers.filter(t => t.id !== id);
    setTimers(next); saveTimers(next);
    if (selId === id) { const s = next[0]?.id || null; setSelId(s); saveLast(s||''); }
  }

  function handleSave(t) {
    const i = timers.findIndex(x => x.id === t.id);
    const next = i >= 0 ? timers.map(x => x.id===t.id ? t : x) : [...timers, t];
    setTimers(next); saveTimers(next);
    setSelId(t.id); saveLast(t.id);
    setEditing(null); setScreen('home');
  }

  return (
    <>
      <HomeScreen
        timers={timers} selId={selId}
        onSelect={handleSelect} onCreate={handleCreate}
        onEdit={handleEdit} onDelete={handleDelete}
        active={screen === 'home'}
      />
      <CreateScreen
        key={screen === 'create' ? (editing?.id || 'new') : 'closed'}
        onBack={() => { setEditing(null); setScreen('home'); }}
        onCreate={handleSave}
        editTimer={editing}
        active={screen === 'create'}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
