<script>
(function(){
"use strict";

lnk.rel='stylesheet';
lnk.href='https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap';

/* ── Tokens ── */
var T={
  primary:'#EDE136', ink:'#2D2E36', bg:'#25262D',
  raised:'#42434A', disabled:'#817D36', white:'#FFFFFF',

var tg=window.Telegram&&window.Telegram.WebApp;
if(tg){tg.ready();tg.expand();}

/* ── Utils ── */
function fmt(s){return Math.floor(s/60)+':'+(''+(s%60)).padStart(2,'0');}
function fmtMin(s){return s<60?s+' с':(s%60===0?s/60+' мин':fmt(s));}
function plural(n,a,b,c){return n%10===1&&n%100!==11?a:n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)?b:c;}

/* ── LocalStorage ── */
var LS={KEY:'bt9',LAST:'bt9_last',SND:'bt_sound'};
var DEF=[
  {id:'d1',label:'3 мин · Классик',roundTime:180,rest:60,rounds:3,explosive:null},
  {id:'d2',label:'2 мин · Боец',   roundTime:120,rest:60,rounds:12,explosive:null}
];
function loadTimers(){try{return JSON.parse(localStorage.getItem(LS.KEY)||'null')||DEF;}catch(e){return DEF;}}
function saveTimers(t){try{localStorage.setItem(LS.KEY,JSON.stringify(t));}catch(e){}}
function loadLast(){try{return localStorage.getItem(LS.LAST)||'d1';}catch(e){return 'd1';}}
function saveLast(id){try{localStorage.setItem(LS.LAST,id);}catch(e){}}
function loadSound(){try{return localStorage.getItem(LS.SND)||'electronic';}catch(e){return 'electronic';}}
function saveSound(t){try{localStorage.setItem(LS.SND,t);}catch(e){}}

/* ── buildPhases ── */
function buildPhases(t){
  var N=t.rounds===Infinity?999:t.rounds,ph=[];
  for(var r=1;r<=N;r++){
    if(t.explosive&&t.explosive.trigger==='end_minute'){
      var w=t.explosive.warnTime,mins=Math.floor(t.roundTime/60);
      for(var m=0;m<mins;m++) ph.push({phase:'work',dur:60,round:r,boomAt:w});
      var rem=t.roundTime%60;
      if(rem>0) ph.push({phase:'work',dur:rem,round:r,boomAt:rem>w?w:0});
    } else if(t.explosive&&t.explosive.trigger==='end_round'){
      ph.push({phase:'work',dur:t.roundTime,round:r,boomAt:t.explosive.warnTime});
    } else {
      ph.push({phase:'work',dur:t.roundTime,round:r,boomAt:0});
    }
    if(r<N) ph.push({phase:'rest',dur:t.rest,round:r,boomAt:0});
  }
  return ph;
}

/* ── Sound ── */
function playElectronic(type){
  var ctx=new(window.AudioContext||window.webkitAudioContext)();
  function tone(f,dur,delay,vol){
    delay=delay||0;vol=vol||0.3;
    var o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    o.frequency.value=f;o.type='square';
    var t=ctx.currentTime+delay;
    g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur);
  }
  if(type==='start'){tone(880,.12);tone(1100,.18,.15);}
  if(type==='end'){tone(1100,.1);tone(880,.1,.14);tone(660,.22,.28);}
  if(type==='boom'){tone(1320,.08);tone(1760,.12,.1);}
  if(type==='tick'){tone(440,.05,0,.14);}
}
function playGong(type){
  var ctx=new(window.AudioContext||window.webkitAudioContext)();
  var now=ctx.currentTime;
  function strike(base,dur,vol){
    vol=vol||0.4;
    [1,2.756,5.404,8.933,13.344].forEach(function(p,i){
      var o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=base*p;o.type='sine';
      g.gain.setValueAtTime(vol*[1,.6,.3,.15,.08][i],now);
      g.gain.exponentialRampToValueAtTime(0.0001,now+dur*(1/(i+1)*1.5));
      o.start(now);o.stop(now+dur+.1);
    });
  }
  if(type==='start') strike(220,2.5,.45);
  if(type==='end') [0,.28,.52].forEach(function(d){setTimeout(function(){strike(220,1.5,.35);},d*1000);});
  if(type==='boom') strike(440,.8,.3);
  if(type==='tick') strike(660,.3,.15);
}
function beep(type){try{loadSound()==='gong'?playGong(type):playElectronic(type);}catch(e){}}
function hap(t){
  try{
    if(!tg||!tg.HapticFeedback)return;
    if(t==='l')tg.HapticFeedback.impactOccurred('light');
    if(t==='m')tg.HapticFeedback.impactOccurred('medium');
    if(t==='s')tg.HapticFeedback.notificationOccurred('success');
  }catch(e){}
}

/* ── BoxingDS Components ── */
function svg(paths,sw,stroke){
  return h('svg',{viewBox:'0 0 24 24',width:22,height:22,fill:'none',
    stroke:stroke||T.primary,strokeWidth:sw||2.4,strokeLinecap:'round',strokeLinejoin:'round'},
    paths.map(function(d,i){return h('path',{key:i,d:d});})
  );
}
var TrashIcon=svg(['M4 7h16M9 7V4h6v3M6 7l1 13h10l1-13M10 11v6M14 11v6'],2);
var ChevronDown=svg(['M6 9l6 6 6-6'],2.4);
var ChevronUp=svg(['M18 15l-6-6-6 6'],2.4);

function DSButton(props){
  var dis=props.variant==='disabled'||props.disabled;
  var st=Object.assign({
    background:dis?T.disabled:T.primary,
    color:T.ink,fontFamily:T.font,fontWeight:800,
    fontSize:props.size||24,letterSpacing:'1px',textTransform:'uppercase',
    textAlign:'center',padding:'18px',border:'none',width:'100%',
    borderRadius:T.radius,cursor:dis?'default':'pointer',
    opacity:dis?0.9:1,userSelect:'none'
  },props.style);
  return h('button',{style:st,onClick:dis?undefined:props.onClick,disabled:dis},props.children);
}

function DSIconButton(props){
  var size=props.box||64;
  var inner=props.icon==='trash'?TrashIcon
    :props.icon==='plus'?h('span',{style:{color:T.primary,fontSize:34,fontWeight:600,lineHeight:1}},'+')
    :props.icon;
  return h('button',{onClick:props.onClick,style:Object.assign({
    width:size,height:size,background:T.raised,border:'none',
    borderRadius:T.radius,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'
  },props.style)},inner);
}

function DSHeaderBand(props){
  return h('div',{style:{background:T.primary,padding:'22px 20px 26px'}},
    h('span',{style:{
      display:'inline-block',color:T.ink,fontFamily:T.font,fontWeight:800,
      fontSize:props.size||26,textTransform:'uppercase',letterSpacing:'0.5px',
      borderBottom:'3px solid '+T.ink,paddingBottom:'8px'
    }},props.title)
  );
}

function DSField(props){
  var s=useState(false),open=s[0],setOpen=s[1];
  var hasVal=props.value!=null&&props.value!=='';
  var border=open?T.disabled:(hasVal?T.primary:T.border);
  return h('div',{style:{border:'2px solid '+border,borderRadius:T.radius,overflow:'hidden'}},
    h('div',{onClick:function(){setOpen(!open);},style:{
      display:'flex',alignItems:'center',justifyContent:'space-between',
      padding:'16px 18px',cursor:'pointer'
    }},
      h('span',{style:{
        color:hasVal?T.white:'#C9CAD2',fontFamily:T.font,fontWeight:700,
        fontSize:16,letterSpacing:'1px',textTransform:'uppercase'
      }},hasVal?props.value:props.label),
      open?ChevronUp:ChevronDown
    ),
    open?h('div',null,(props.options||[]).map(function(opt){
      var sel=opt===props.value;
      return h('div',{key:opt,onClick:function(){setOpen(false);props.onChange&&props.onChange(opt);},style:{
        background:sel?T.disabled:'transparent',
        color:sel?T.white:'#C9CAD2',
        fontFamily:T.font,fontWeight:sel?700:600,fontSize:16,
        letterSpacing:'1px',padding:'14px 18px',cursor:'pointer'
      }},opt);
    })):null
  );
}

function DSDurationChip(props){
  var sel=props.selected;
  return h('div',{onClick:props.onClick,style:Object.assign({
    width:80,height:80,
    background:sel?'transparent':T.raised,
    border:sel?'2.5px solid '+T.primary:'2.5px solid transparent',
    borderRadius:T.radius,display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',gap:'2px',cursor:'pointer'
  },props.style)},
    h('span',{style:{color:T.primary,fontFamily:T.font,fontWeight:800,fontSize:24,lineHeight:1}},props.primary),
    props.secondary?h('span',{style:{color:T.primary,fontFamily:T.font,fontWeight:800,fontSize:12,letterSpacing:'1px'}},props.secondary):null,
    props.sub?h('span',{style:{color:T.primary,fontFamily:T.font,fontWeight:700,fontSize:10,textAlign:'center',lineHeight:1.2,marginTop:2}},props.sub):null
  );
}

function DSAddChip(props){
  return h('div',{onClick:props.onClick,style:Object.assign({
    width:80,height:80,background:T.raised,borderRadius:T.radius,
    display:'flex',alignItems:'center',justifyContent:'center',
    color:T.primary,fontSize:34,cursor:'pointer'
  },props.style)},'+');
}

function DSTimerDisplay(props){
  return h('div',{style:Object.assign({
    background:T.primary,borderRadius:props.flush?0:T.radius,
    padding:'30px 20px',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',
    flex:props.flush?1:'none'
  },props.style)},
    h('div',{style:{
      width:56,height:56,borderRadius:'50%',background:T.ink,
      color:T.white,fontFamily:T.font,fontWeight:800,fontSize:22,
      display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8
    }},props.count),
    h('div',{style:{color:T.ink,fontFamily:T.font,fontWeight:800,fontSize:15,letterSpacing:'2px',marginBottom:16}},props.label||'ROUNDS'),
    h('div',{style:{
      color:T.ink,fontFamily:T.font,fontWeight:900,
      fontSize:props.timeSize||76,lineHeight:1,letterSpacing:'-1px'
    }},props.time)
  );
}

/* ── Field option data ── */
var RT_OPTS=[10,20,30,40,50,60,90,120,150,180,210,240,270,300,360,420,480,540,600];
var REST_OPTS=[10,20,30,40,50,60,90,120,180];
var EXP_DATA=[
  {l:'Без взрывов',v:null},
  {l:'В конце раунда',v:'end_round'},
  {l:'В конце каждой минуты',v:'end_minute'}
];
var WARN_OPTS=[5,10,15,20,25,30];
var RT_LABELS=RT_OPTS.map(fmtMin);
var REST_LABELS=REST_OPTS.map(fmtMin);
var ROUNDS_LABELS=(function(){var a=[];for(var i=1;i<=15;i++)a.push(String(i));a.push('∞');return a;})();
var EXP_LABELS=EXP_DATA.map(function(o){return o.l;});
var WARN_LABELS=WARN_OPTS.map(function(s){return s+' с';});
var RT_REV={};RT_OPTS.forEach(function(s){RT_REV[fmtMin(s)]=s;});
var REST_REV={};REST_OPTS.forEach(function(s){REST_REV[fmtMin(s)]=s;});
var EXP_REV={};EXP_DATA.forEach(function(o){EXP_REV[o.l]=o.v;});
var WARN_REV={};WARN_OPTS.forEach(function(s){WARN_REV[s+' с']=s;});

/* ── CreateScreen ── */
function CreateScreen(props){
  var onBack=props.onBack,onCreate=props.onCreate,editTimer=props.editTimer,active=props.active;
  var s1=useState(editTimer&&editTimer.roundTime?fmtMin(editTimer.roundTime):'');
  var rtStr=s1[0],setRtStr=s1[1];
  var s2=useState(editTimer&&editTimer.rest?fmtMin(editTimer.rest):'');
  var restStr=s2[0],setRestStr=s2[1];
  var s3=useState(editTimer?(editTimer.rounds===Infinity?'∞':String(editTimer.rounds)):'');
  var rdsStr=s3[0],setRdsStr=s3[1];
  var initExp=editTimer?(EXP_DATA.find(function(o){return o.v===(editTimer.explosive?editTimer.explosive.trigger:null);})||{l:'Без взрывов'}).l:'Без взрывов';
  var s4=useState(initExp);
  var expStr=s4[0],setExpStr=s4[1];
  var s5=useState(editTimer&&editTimer.explosive&&editTimer.explosive.warnTime?editTimer.explosive.warnTime+' с':'10 с');
  var warnStr=s5[0],setWarnStr=s5[1];

  var expTrigger=EXP_REV[expStr]!==undefined?EXP_REV[expStr]:null;
  var showWarn=expTrigger!==null;
  var ok=rtStr&&restStr&&rdsStr;

  function submit(){
    hap('s');
    var rt=RT_REV[rtStr];
    var rest=REST_REV[restStr];
    var rds=rdsStr==='∞'?Infinity:parseInt(rdsStr);
    var warn=WARN_REV[warnStr]||10;
    var label=fmtMin(rt)+' · '+(rds===Infinity?'∞':rds)+' '+plural(rds===Infinity?5:rds,'раунд','раунда','раундов');
    onCreate({
      id:editTimer?editTimer.id:String(Date.now()),
      label:label,roundTime:rt,rest:rest,rounds:rds,
      explosive:expTrigger?{trigger:expTrigger,warnTime:warn}:null
    });
  }

  var fields=[
    h(DSField,{key:'rt',label:'ВРЕМЯ РАУНДА',value:rtStr,options:RT_LABELS,onChange:setRtStr}),
    h(DSField,{key:'rest',label:'ОТДЫХ',value:restStr,options:REST_LABELS,onChange:setRestStr}),
    h(DSField,{key:'rds',label:'РАУНДЫ',value:rdsStr,options:ROUNDS_LABELS,onChange:setRdsStr}),
    h(DSField,{key:'exp',label:'ВЗРЫВНАЯ РАБОТА',value:expStr,options:EXP_LABELS,onChange:setExpStr})
  ];
  if(showWarn) fields.push(h(DSField,{key:'warn',label:'ПРЕДУПРЕЖДЕНИЕ',value:warnStr,options:WARN_LABELS,onChange:setWarnStr}));

  return h('div',{style:{
    position:'fixed',inset:0,zIndex:2,background:T.bg,
    display:'flex',flexDirection:'column',
    transform:active?'translateX(0)':'translateX(100%)',
    transition:'transform .3s cubic-bezier(.3,0,.2,1)'
  }},
    h(DSHeaderBand,{title:editTimer?'ИЗМЕНИТЬ ТАЙМЕР':'НОВЫЙ ТАЙМЕР'}),
    h('div',{style:{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:12}},
      fields,
      h('div',{style:{height:16}})
    ),
    h('div',{style:{display:'flex',gap:12,padding:16,paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 16px)',background:T.bg}},
      h(DSIconButton,{icon:'trash',onClick:function(){hap('l');onBack();},box:60}),
      h(DSButton,{variant:ok?'primary':'disabled',onClick:ok?submit:undefined,style:{flex:1,height:60,fontSize:20}},
        editTimer?'СОХРАНИТЬ':'СОЗДАТЬ'
      )
    )
  );
}

/* ── menu item style ── */
var MI={
  display:'block',width:'100%',background:'none',border:'none',
  borderTop:'1px solid '+T.border,
  padding:'15px 20px',textAlign:'left',
  fontFamily:T.font,fontWeight:700,fontSize:14,
  color:T.white,letterSpacing:'1.5px',textTransform:'uppercase',cursor:'pointer'
};

/* ── HomeScreen ── */
function HomeScreen(props){
  var timers=props.timers,selId=props.selId,onSelect=props.onSelect,
      onCreate=props.onCreate,onEdit=props.onEdit,onDelete=props.onDelete,active=props.active;
  var timer=timers.find(function(t){return t.id===selId;})||timers[0];
  var phasesRef=useRef(timer?buildPhases(timer):[]);

  var s1=useState(0); var idx=s1[0],setIdx=s1[1];
  var s2=useState(function(){return phasesRef.current[0]?phasesRef.current[0].dur:0;});
  var left=s2[0],setLeft=s2[1];
  var s3=useState(false); var run=s3[0],setRun=s3[1];
  var s4=useState(false); var done=s4[0],setDone=s4[1];
  var s5=useState(false); var menu=s5[0],setMenu=s5[1];
  var s6=useState(loadSound); var snd=s6[0],setSnd=s6[1];
  var ivRef=useRef(null);
  var idxRef=useRef(0);
  idxRef.current=idx;

  useEffect(function(){
    if(!timer)return;
    clearInterval(ivRef.current);
    phasesRef.current=buildPhases(timer);
    setIdx(0);setLeft(phasesRef.current[0]?phasesRef.current[0].dur:0);
    setRun(false);setDone(false);
  },[selId]);

  function stop(){clearInterval(ivRef.current);setRun(false);}
  function reset(){stop();setIdx(0);setLeft(phasesRef.current[0]?phasesRef.current[0].dur:0);setDone(false);hap('l');}

  function tick(){
    setLeft(function(prev){
      if(prev<=1){
        var ni=idxRef.current+1;
        if(ni>=phasesRef.current.length){stop();setDone(true);beep('end');hap('s');return 0;}
        beep('end');hap('m');setIdx(ni);
        return phasesRef.current[ni].dur;
      }
      var cur=phasesRef.current[idxRef.current];
      if(cur&&cur.boomAt>0&&prev===cur.boomAt+1){beep('boom');hap('m');}
      if(prev<=3){beep('tick');hap('l');}
      return prev-1;
    });
  }
  function toggle(){
    if(done)return;
    if(run)stop();
    else{beep('start');hap('m');setRun(true);ivRef.current=setInterval(tick,1000);}
  }
  useEffect(function(){return function(){clearInterval(ivRef.current);};},[]);

  var cur=phasesRef.current[idx];
  var totalR=timer&&timer.rounds===Infinity?'∞':(timer?timer.rounds:0);
  var curR=cur?cur.round:1;
  var isBoom=!done&&cur&&cur.boomAt>0&&left<=cur.boomAt;
  var isRest=!done&&cur&&cur.phase==='rest';
  var dispLabel=isBoom?'ВЗРЫВ!':isRest?'ОТДЫХ':(run||idx>0)?'ROUND':'ROUNDS';
  var dispCount=(run||idx>0)?curR:totalR;
  var dispTime=fmt(left);

  function chgSound(s){saveSound(s);setSnd(s);hap('l');}

  /* Done screen */
  if(done) return h('div',{style:{position:'fixed',inset:0,display:'flex',flexDirection:'column',background:T.bg}},
    h(DSHeaderBand,{title:'ТРЕНИРОВКА ЗАВЕРШЕНА!'}),
    h('div',{style:{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:16,gap:16}},
      h('div',{style:{fontSize:72}},'🥊'),
      h('div',{style:{color:T.muted,fontFamily:T.font,fontSize:16,fontWeight:500}},'Отличная работа, чемпион'),
      h('div',{style:{display:'flex',gap:10,width:'100%',maxWidth:340}},
        [{v:totalR,l:'РАУНДОВ'},{v:timer?fmt(timer.roundTime):'',l:'РАУНД'},{v:timer?fmtMin(timer.rest):'',l:'ОТДЫХ'}].map(function(x){
          return h('div',{key:x.l,style:{flex:1,background:T.raised,borderRadius:T.radius,padding:'16px 8px',textAlign:'center'}},
            h('div',{style:{color:T.primary,fontFamily:T.font,fontWeight:800,fontSize:22,lineHeight:1}},x.v),
            h('div',{style:{color:T.muted,fontFamily:T.font,fontWeight:700,fontSize:11,letterSpacing:'1.5px',textTransform:'uppercase',marginTop:6}},x.l)
          );
        })
      )
    ),
    h('div',{style:{padding:16,paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 16px)'}},
      h(DSButton,{onClick:reset,style:{height:60,fontSize:22}},'ЕЩЁ РАЗ')
    )
  );

  /* Main screen */
  return h('div',{style:{
    position:'fixed',inset:0,display:'flex',flexDirection:'column',background:T.bg,
    transform:active?'none':'translateX(-25%)',
    opacity:active?1:0.5,
    transition:'transform .3s cubic-bezier(.3,0,.2,1),opacity .3s',
    pointerEvents:active?'auto':'none'
  }},
    /* menu button */
    h('button',{onClick:function(){hap('l');setMenu(true);},style:{
      position:'absolute',zIndex:1,
      top:'calc(env(safe-area-inset-top,0px) + 12px)',right:16,
      background:'none',border:'none',cursor:'pointer',
      color:T.ink,fontSize:26,lineHeight:1,padding:8,fontWeight:900
    }},'≡'),
    /* timer display */
    h(DSTimerDisplay,{flush:true,count:dispCount,label:dispLabel,time:dispTime,timeSize:88,style:{flex:1}}),
    /* shelf */
    h('div',{style:{padding:'10px 12px 6px',borderTop:'1px solid '+T.raised}},
      h('div',{style:{display:'flex',gap:10,overflowX:'auto',alignItems:'stretch'}},
        timers.map(function(t){
          var isSel=t.id===selId;
          var mins=Math.floor(t.roundTime/60),secs=t.roundTime%60;
          return h(DSDurationChip,{
            key:t.id,
            primary:isSel&&run?curR:(mins>0?mins:secs),
            secondary:isSel&&run?'/ '+totalR:(mins>0?'МИН':'СЕК'),
            sub:isSel&&run?t.label:(t.rounds===Infinity?'∞':t.rounds)+' РД',
            selected:isSel,
            onClick:function(){hap('l');onSelect(t.id);}
          });
        }),
        h(DSAddChip,{onClick:function(){hap('l');onCreate();}})
      )
    ),
    /* buttons */
    h('div',{style:{padding:'10px 16px',paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 16px)',display:'flex',gap:12}},
      run||idx>0?h(React.Fragment,null,
        h(DSIconButton,{icon:'trash',onClick:reset,box:60,style:{background:T.raised}}),
        h(DSButton,{variant:run?'primary':'disabled',onClick:toggle,style:{flex:1,height:60,fontSize:22}},run?'STOP':'START')
      ):h(DSButton,{onClick:toggle,style:{height:60,fontSize:22}},'START')
    ),
    /* menu sheet */
    menu?h('div',{onClick:function(){setMenu(false);},style:{
      position:'fixed',inset:0,zIndex:10,background:'rgba(0,0,0,.6)',display:'flex',alignItems:'flex-end'
    }},
      h('div',{onClick:function(e){e.stopPropagation();},style:{
        width:'100%',background:T.raised,borderRadius:'12px 12px 0 0',
        paddingBottom:'calc(env(safe-area-inset-bottom,0px) + 8px)'
      }},
        h('div',{style:{width:36,height:4,borderRadius:2,background:T.muted,margin:'12px auto 4px',opacity:.5}}),
        h('div',{style:{padding:'8px 20px 14px',fontFamily:T.font,fontWeight:800,fontSize:15,color:T.white,letterSpacing:'1px',textTransform:'uppercase',borderBottom:'1px solid '+T.border}},timer?timer.label:''),
        h('div',{style:{display:'flex',alignItems:'center',padding:'14px 20px',borderBottom:'1px solid '+T.border}},
          h('span',{style:{flex:1,fontFamily:T.font,fontWeight:700,fontSize:14,color:T.white,letterSpacing:'1px',textTransform:'uppercase'}},'Звук'),
          ['electronic','gong'].map(function(s){
            return h('button',{key:s,onClick:function(){chgSound(s);},style:{
              marginLeft:8,padding:'5px 12px',
              border:'2px solid '+(snd===s?T.primary:T.border),
              borderRadius:T.radius,background:'transparent',
              color:snd===s?T.primary:T.muted,
              fontFamily:T.font,fontWeight:700,fontSize:11,cursor:'pointer',letterSpacing:'0.5px',textTransform:'uppercase'
            }},s==='electronic'?'ЭЛЕКТРО':'ГОНГ');
          })
        ),
        h('button',{onClick:function(){hap('l');setMenu(false);onCreate();},style:MI},'＋ Новый таймер'),
        h('button',{onClick:function(){hap('l');setMenu(false);onEdit(timer);},style:MI},'✏️ Изменить'),
        h('button',{onClick:function(){hap('m');setMenu(false);onDelete(timer.id);},style:Object.assign({},MI,{color:T.primary})},'🗑 Удалить'),
        h('button',{onClick:function(){setMenu(false);},style:MI},'✕ Закрыть')
      )
    ):null
  );
}

/* ── App ── */
function App(){
  var s1=useState(loadTimers); var timers=s1[0],setTimers=s1[1];
  var s2=useState(function(){
    var last=loadLast(),all=loadTimers();
    return all.find(function(x){return x.id===last;})?last:(all[0]?all[0].id:null);
  });
  var selId=s2[0],setSelId=s2[1];
  var s3=useState('home'); var screen=s3[0],setScreen=s3[1];
  var s4=useState(null); var editing=s4[0],setEditing=s4[1];

  function handleSelect(id){setSelId(id);saveLast(id);}
  function handleCreate(){setEditing(null);setScreen('create');}
  function handleEdit(t){setEditing(t);setScreen('create');}
  function handleDelete(id){
    var next=timers.filter(function(t){return t.id!==id;});
    setTimers(next);saveTimers(next);
    if(selId===id){var s=next[0]?next[0].id:null;setSelId(s);saveLast(s||'');}
  }
  function handleSave(t){
    var i=timers.findIndex(function(x){return x.id===t.id;});
    var next=i>=0?timers.map(function(x){return x.id===t.id?t:x;}):[].concat(timers,[t]);
    setTimers(next);saveTimers(next);
    setSelId(t.id);saveLast(t.id);
    setEditing(null);setScreen('home');
  }

  return h(React.Fragment,null,
    h(HomeScreen,{
      timers:timers,selId:selId,
      onSelect:handleSelect,onCreate:handleCreate,
      onEdit:handleEdit,onDelete:handleDelete,
      active:screen==='home'
    }),
    h(CreateScreen,{
      key:screen==='create'?(editing?editing.id:'new'):'closed',
      onBack:function(){setEditing(null);setScreen('home');},
      onCreate:handleSave,
      editTimer:editing,
      active:screen==='create'
    })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));

})();
</script>
</body>
</html>
